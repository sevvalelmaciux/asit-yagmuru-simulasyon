<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ASİT YAĞMURU SİMÜLATÖRÜ</title>
    <style>
        :root { --blue: #00d2ff; --red: #ff0055; --orange: #fbbf24; --green: #00ffaa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #050a14; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #city-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000') no-repeat center center/cover;
            z-index: -2; transition: 0.8s filter ease;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.98); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s;
        }

        #start-btn {
            padding: 20px 40px; font-size: 1.5em; font-weight: bold;
            color: white; background: var(--blue); border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .card { width: 950px; background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: border-color 0.3s; }
        
        /* SARSINTI EFEKTİ (Çok Hafif) */
        .danger-shake { animation: shake 0.4s infinite; border-color: var(--red) !important; }
        @keyframes shake { 0%{transform:translate(0.5px, 0.5px)} 25%{transform:translate(-0.5px, 0px)} 50%{transform:translate(0.5px, -0.5px)} 75%{transform:translate(-0.5px, 0.5px)} 100%{transform:translate(0px, -0.5px)} }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(48, 54, 61, 0.5); padding-bottom: 15px; }
        #ph-val { font-size: 4.5em; font-weight: 900; margin: 0; color: var(--blue); transition: 0.5s color ease; }
        #ph-compare { font-size: 1.1em; color: #fbbf24; font-weight: bold; display: block; margin-top: -5px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; background: rgba(22, 27, 34, 0.6); padding: 20px; border-radius: 20px 20px 0 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--blue); }
        
        .reaction-panel {
            background: rgba(0, 0, 0, 0.4); padding: 18px; margin-bottom: 25px; border-radius: 0 0 20px 20px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; gap: 12px; text-align: center;
        }
        .reac-line { transition: 0.4s; color: #777; font-weight: 500; }
        .active-reac { color: #ffffff !important; text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        .visuals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .box { background: rgba(1, 4, 9, 0.4); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .icon { font-size: 65px; display: block; margin-bottom: 10px; transition: 0.8s filter ease; }
        .info { font-size: 0.75em; color: #cbd5e1; margin-top: 8px; min-height: 40px; line-height: 1.4; }

        .alert-panel { margin-top: 20px; padding: 20px; border-radius: 15px; border-left: 6px solid var(--blue); background: rgba(22, 27, 34, 0.8); font-size: 1.1em; transition: 0.5s; text-align: center; }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="font-size: 3em; margin-bottom: 30px; letter-spacing: 2px;">ASİT YAĞMURU SİMÜLATÖRÜ</h1>
    <button id="start-btn">SİSTEMİ BAŞLAT</button>
</div>

<div id="city-bg"></div>
<canvas id="rainCanvas"></canvas>

<div class="card" id="app-frame">
    <div class="header">
        <h1 style="margin:0; letter-spacing: 1px; font-size: 1.6em; color: var(--blue);">ASİT YAĞMURU ANALİZİ</h1>
        <div style="text-align: right;">
            <p style="margin:0; font-size: 0.8em; color: #8b949e;">YAĞMUR pH</p>
            <h2 id="ph-val">5.60</h2>
            <span id="ph-compare">Doğal Yağmur</span>
        </div>
    </div>

    <div class="controls">
        <div><label>🏭 FABRİKA EMİSYONU (SO₂)</label><input type="range" id="so2_in" min="0" max="100" value="0"></div>
        <div><label>🚗 TRAFİK YOĞUNLUĞU (NOₓ)</label><input type="range" id="nox_in" min="0" max="100" value="0"></div>
    </div>

    <div class="reaction-panel">
        <div id="reac-natural" class="reac-line active-reac" style="color: var(--green) !important;">CO₂ + H₂O → <b>H₂CO₃ (Karbonik Asit)</b></div>
        <div id="reac-so2" class="reac-line">Kükürt emisyonu yok.</div>
        <div id="reac-nox" class="reac-line">Azot emisyonu yok.</div>
    </div>

    <div class="visuals">
        <div class="box"><span id="ico-1" class="icon">🌳</span><b style="font-size: 0.8em;">DOĞA</b><p id="t1" class="info"></p></div>
        <div class="box"><span id="ico-2" class="icon">🦌</span><b style="font-size: 0.8em;">HAYVANLAR</b><p id="t2" class="info"></p></div>
        <div class="box"><span id="ico-3" class="icon">🏛️</span><b style="font-size: 0.8em;">ESERLER</b><p id="t3" class="info"></p></div>
        <div class="box"><span id="ico-4" class="icon">😀</span><b style="font-size: 0.8em;">SAĞLIK</b><p id="t4" class="info"></p></div>
    </div>

    <div class="alert-panel" id="report-box">DURUM: Hava kalitesi standartlara uygun.</div>
</div>

<script>
    const canvas = document.getElementById('rainCanvas'), ctx = canvas.getContext('2d');
    const so2 = document.getElementById('so2_in'), nox = document.getElementById('nox_in');
    const phVal = document.getElementById('ph-val'), phCompare = document.getElementById('ph-compare');
    const app = document.getElementById('app-frame'), report = document.getElementById('report-box');
    const cityBg = document.getElementById('city-bg'), startOverlay = document.getElementById('start-overlay');
    const reacNatural = document.getElementById('reac-natural'), reacSo2 = document.getElementById('reac-so2'), reacNox = document.getElementById('reac-nox');

    let w, h, rainDrops = [], currentRainCount = 0;

    class Drop {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h - h;
            this.length = Math.random() * 25 + 15; this.speed = Math.random() * 15 + 10;
        }
        draw() {
            ctx.beginPath(); ctx.strokeStyle = 'rgba(174, 194, 224, 0.4)'; ctx.lineWidth = 1;
            ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.length); ctx.stroke();
        }
        update() { this.y += this.speed; if (this.y > h) { this.y = -20; this.x = Math.random() * w; } }
    }

    function setupCanvas() {
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        rainDrops = Array.from({length: 600}, () => new Drop());
    }

    function animateRain() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < currentRainCount; i++) { rainDrops[i].update(); rainDrops[i].draw(); }
        requestAnimationFrame(animateRain);
    }

    document.getElementById('start-btn').onclick = () => {
        startOverlay.style.opacity = '0';
        setTimeout(() => startOverlay.style.visibility = 'hidden', 500);
        setupCanvas(); animateRain();
    };

    function refresh() {
        let s = parseInt(so2.value), n = parseInt(nox.value);
        currentRainCount = (s + n) * 3 + 15;
        let phNum = (5.6 - (s * 0.026) - (n * 0.014));
        if (phNum < 2.0) phNum = 2.0;
        phVal.innerText = phNum.toFixed(2);

        // Kademeli Tepkime Mantığı (karbonikasitvarbaşta.html'den)
        if (s === 0 && n === 0) {
            reacNatural.innerHTML = "CO₂ + H₂O → <b style='color:var(--green)'>H₂CO₃ (Karbonik Asit)</b>";
            reacNatural.className = "reac-line active-reac";
        } else {
            reacNatural.innerHTML = "Atmosfer dengesi bozuluyor...";
            reacNatural.className = "reac-line";
        }

        if (s > 60) {
            reacSo2.innerHTML = "2SO₂ + O₂ + 2H₂O → <b style='color:var(--red)'>2H₂SO₄ (Kuvvetli Sülfürik Asit)</b>";
            reacSo2.className = "reac-line active-reac";
        } else if (s > 0) {
            reacSo2.innerHTML = "SO₂ + H₂O → <b style='color:var(--orange)'>H₂SO₃ (Sülfürik Asit)</b>";
            reacSo2.className = "reac-line active-reac";
        } else {
            reacSo2.innerHTML = "Kükürt emisyonu yok.";
            reacSo2.className = "reac-line";
        }

        if (n > 60) {
            reacNox.innerHTML = "4NO₂ + O₂ + 2H₂O → <b style='color:var(--red)'>4HNO₃ (Kuvvetli Nitrik Asit)</b>";
            reacNox.className = "reac-line active-reac";
        } else if (n > 0) {
            reacNox.innerHTML = "NO₂ + H₂O → <b style='color:var(--orange)'>HNO₃ (Nitrik Asit)</b>";
            reacNox.className = "reac-line active-reac";
        } else {
            reacNox.innerHTML = "Azot emisyonu yok.";
            reacNox.className = "reac-line";
        }

        // Bilimsel pH Kıyaslamaları (tuhaf.html'den)
        if (phNum >= 5.0) phCompare.innerText = "Doğal Yağmur";
        else if (phNum > 4.5) phCompare.innerText = "Muz Asitliği (~5.1)";
        else if (phNum > 3.8) phCompare.innerText = "Portakal Suyu (~4.0)";
        else if (phNum > 2.8) phCompare.innerText = "Sirke Seviyesi (~3.0)";
        else if (phNum > 2.2) phCompare.innerText = "Limon Suyu (~2.2)";
        else phCompare.innerText = "Mide Asidi Seviyesi! (~1.5)";

        let dmg = (5.6 - phNum) / 3.6;
        cityBg.style.filter = `brightness(${1 - (dmg * 0.7)}) grayscale(${dmg * 100}%) contrast(${1 + (dmg * 0.3)})`;

        const t1 = document.getElementById('t1'), t2 = document.getElementById('t2'), t3 = document.getElementById('t3'), t4 = document.getElementById('t4');
        const i1 = document.getElementById('ico-1'), i2 = document.getElementById('ico-2'), i3 = document.getElementById('ico-3'), i4 = document.getElementById('ico-4');

        // Durum Paneli ve Dinamik Sarsıntı
        if (phNum > 5.0) {
            phVal.style.color = "var(--blue)";
            app.classList.remove('danger-shake');
            report.innerHTML = "<b>DURUM:</b> Hava kalitesi standartlara uygun.";
            report.style.borderLeftColor = "var(--blue)";
            i1.innerText = "🌳"; i2.innerText = "🦌"; i3.innerText = "🏛️"; i4.innerText = "😀";
            t1.innerText = "Hava kalitesi standartlara uygun."; t2.innerText = "Yaban hayatı dengede."; t3.innerText = "Mermer yüzeyler pürüzsüz."; t4.innerText = "Nefes kalitesi optimal.";
        } else if (phNum > 4.2) {
            phVal.style.color = "var(--orange)";
            app.classList.remove('danger-shake');
            report.innerHTML = "<b>UYARI:</b> Yağmur asitliği artmaya başladı.";
            report.style.borderLeftColor = "var(--orange)";
            i1.innerText = "🌿"; i2.innerText = "🦌"; i3.innerText = "🏚️"; i4.innerText = "🤒";
            t1.innerText = "Bitki örtüsünde sararma başladı."; t2.innerText = "Hayvanlarda göç hareketliliği."; t3.innerText = "Asit mermeri aşındırmaya başladı."; t4.innerText = "Nefes darlığı ve hırıltı şikayeti.";
        } else {
            phVal.style.color = "var(--red)";
            app.classList.add('danger-shake'); // Kırmızıya gidince sarsıntı başlar
            report.innerHTML = "<b>FELAKET:</b> Ekolojik çöküş ve ağır hasar!";
            report.style.borderLeftColor = "var(--red)";
            i1.innerText = "🍂"; i2.innerText = "💀"; i3.innerText = "🏛️"; i4.innerText = "😷";
            t1.innerText = "Ağaçlar kurudu, yaşam bitti."; t2.innerText = "Toplu hayvan ölümleri!"; t3.innerText = "Mermer eser tamamen çözündü!"; t4.innerText = "KRİTİK: Solunum yetmezliği salgını!";
        }
    }

    so2.oninput = refresh;
    nox.oninput = refresh;
    window.onresize = setupCanvas;
</script>

</body>
</html>
